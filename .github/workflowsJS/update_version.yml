name: update-repository-version
on: 
  workflow_dispatch:
    inputs:
      release_type:
        description: 'patch, minor, major'
        required: true
        default: 'patch'
jobs:
  update-version:
    runs-on: ubuntu-24.04
    steps: 
      - uses: actions/checkout@v6
      - name: update-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull
          

          cp package.json nodescripts/src/
          cd nodescripts
          npm install
          cd src
          node updateVersion.js ${{ github.event.inputs.release_type }}

          cd ../../
          rm package.json
          cp nodescripts/src/package.json package.json

          git add package.json
          git commit -m "Update version"
          git push -u origin master

  deploy-gh-pages:
    needs: update-version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: build
        run: |
          set -e

          git pull

          npm install
          npm run build

          cp CNAME src/.vuepress/dist
          cp plugin_stats.json src/.vuepress/dist/assets
          cp -r plugin_versions src/.vuepress/dist/assets
          cp author_stats.json src/.vuepress/dist/assets

      - name: deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/.vuepress/dist
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
