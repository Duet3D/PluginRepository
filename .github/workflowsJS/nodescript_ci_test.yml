name: nodescript_ci_test
on:
  push:
    branches:
      - master
      - "feature/*"
jobs:
  test:
    runs-on: ubuntu-24.04
    steps: 
      - uses: actions/checkout@v6
        with:
          node-version: 18.x
      - name: run test
        run: |
          cd nodescripts
          npm install
          npm test test/